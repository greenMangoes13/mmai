<svg viewBox="0 0 1400 820" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowhead-black" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#333"/>
    </marker>
  </defs>

  <!-- ============ TITLE ============ -->
  <text x="700" y="42" text-anchor="middle" font-size="28" font-weight="bold" fill="#1a1a2e">
    SEED-DV: Trial Structure &amp; Two Hidden Validity Threats
  </text>

  <!-- ============ STIMULUS STREAM ============ -->
  <text x="40" y="100" font-size="16" font-weight="bold" fill="#1a1a2e">Stimulus stream</text>
  <text x="40" y="120" font-size="13" fill="#555">(blocked design)</text>

  <!-- Block 1 cue: "Cat" -->
  <rect x="180" y="80" width="85" height="100" rx="8" fill="#FF7F2A" stroke="#1a1a2e" stroke-width="2"/>
  <text x="222" y="115" text-anchor="middle" font-size="14" font-weight="bold" fill="white">CUE</text>
  <text x="222" y="142" text-anchor="middle" font-size="17" font-weight="bold" fill="white">"Cat"</text>
  <text x="222" y="166" text-anchor="middle" font-size="11" fill="white" opacity="0.85">3 sec</text>

  <!-- 5 cat clips -->
  <g>
    <rect x="275" y="80" width="80" height="100" rx="6" fill="#3D7EA6" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="315" y="120" text-anchor="middle" font-size="11" fill="white">cat clip</text>
    <polygon points="305,135 305,152 322,143.5" fill="white"/>
    <text x="315" y="173" text-anchor="middle" font-size="10" fill="white" opacity="0.85">2 sec</text>

    <rect x="365" y="80" width="80" height="100" rx="6" fill="#3D7EA6" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="405" y="120" text-anchor="middle" font-size="11" fill="white">cat clip</text>
    <polygon points="395,135 395,152 412,143.5" fill="white"/>

    <rect x="455" y="80" width="80" height="100" rx="6" fill="#3D7EA6" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="495" y="120" text-anchor="middle" font-size="11" fill="white">cat clip</text>
    <polygon points="485,135 485,152 502,143.5" fill="white"/>

    <rect x="545" y="80" width="80" height="100" rx="6" fill="#3D7EA6" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="585" y="120" text-anchor="middle" font-size="11" fill="white">cat clip</text>
    <polygon points="575,135 575,152 592,143.5" fill="white"/>

    <rect x="635" y="80" width="80" height="100" rx="6" fill="#3D7EA6" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="675" y="120" text-anchor="middle" font-size="11" fill="white">cat clip</text>
    <polygon points="665,135 665,152 682,143.5" fill="white"/>
  </g>

  <!-- Position labels -->
  <text x="315" y="208" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">k=1</text>
  <text x="405" y="208" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">k=2</text>
  <text x="495" y="208" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">k=3</text>
  <text x="585" y="208" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">k=4</text>
  <text x="675" y="208" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">k=5</text>

  <!-- separator arrow -->
  <text x="745" y="138" text-anchor="middle" font-size="26" fill="#666">→</text>

  <!-- Block 2 cue: "Dog" -->
  <rect x="775" y="80" width="85" height="100" rx="8" fill="#FF7F2A" stroke="#1a1a2e" stroke-width="2"/>
  <text x="817" y="115" text-anchor="middle" font-size="14" font-weight="bold" fill="white">CUE</text>
  <text x="817" y="142" text-anchor="middle" font-size="17" font-weight="bold" fill="white">"Dog"</text>
  <text x="817" y="166" text-anchor="middle" font-size="11" fill="white" opacity="0.85">3 sec</text>

  <!-- 3 dog clips visible -->
  <g>
    <rect x="870" y="80" width="80" height="100" rx="6" fill="#7B4F8C" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="910" y="120" text-anchor="middle" font-size="11" fill="white">dog clip</text>
    <polygon points="900,135 900,152 917,143.5" fill="white"/>

    <rect x="960" y="80" width="80" height="100" rx="6" fill="#7B4F8C" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="1000" y="120" text-anchor="middle" font-size="11" fill="white">dog clip</text>
    <polygon points="990,135 990,152 1007,143.5" fill="white"/>

    <rect x="1050" y="80" width="80" height="100" rx="6" fill="#7B4F8C" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="1090" y="120" text-anchor="middle" font-size="11" fill="white">dog clip</text>
    <polygon points="1080,135 1080,152 1097,143.5" fill="white"/>
  </g>

  <text x="910" y="208" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">k=1</text>
  <text x="1000" y="208" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">k=2</text>
  <text x="1090" y="208" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">k=3</text>

  <!-- continuation dots -->
  <text x="1190" y="142" text-anchor="middle" font-size="32" font-weight="bold" fill="#666">⋯</text>
  <text x="1240" y="138" text-anchor="middle" font-size="14" fill="#555" font-style="italic">40 concepts</text>
  <text x="1240" y="155" text-anchor="middle" font-size="14" fill="#555" font-style="italic">× 7 sessions</text>

  <!-- time arrow -->
  <line x1="180" y1="232" x2="1170" y2="232" stroke="#666" stroke-width="2" marker-end="url(#arrowhead-black)"/>
  <text x="1190" y="237" font-size="13" fill="#555">time</text>

  <!-- ============ THREAT 1: Run-Position Shortcut ============ -->
  <!-- Red dashed highlight around the k labels -->
  <rect x="270" y="190" width="455" height="32" fill="#C1121F" fill-opacity="0.10"
        stroke="#C1121F" stroke-width="2.5" stroke-dasharray="6,3" rx="4"/>

  <!-- connector down to threat box -->
  <line x1="497" y1="222" x2="497" y2="285" stroke="#C1121F" stroke-width="2.5" stroke-dasharray="4,3"/>
  <polygon points="492,283 502,283 497,295" fill="#C1121F"/>

  <g transform="translate(80, 295)">
    <rect x="0" y="0" width="800" height="120" rx="8" fill="#FFF1F1" stroke="#C1121F" stroke-width="2.5"/>
    <rect x="0" y="0" width="180" height="40" rx="6" fill="#C1121F"/>
    <text x="90" y="27" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Threat #1</text>
    <text x="200" y="27" font-size="20" font-weight="bold" fill="#C1121F">Run-Position Shortcut</text>
    <text x="20" y="65" font-size="14" fill="#1a1a2e">5 consecutive clips share a concept cue. Classifiers may exploit position-dependent neural</text>
    <text x="20" y="85" font-size="14" fill="#1a1a2e">signals — adaptation, expectation, fatigue — instead of learning actual clip content.</text>
    <text x="20" y="108" font-size="13" font-style="italic" fill="#555">Diagnostic: stratify accuracy by clip position k ∈ {1,…,5} and check for monotonic trends.</text>
  </g>

  <!-- ============ CV PIPELINE ============ -->
  <text x="40" y="465" font-size="16" font-weight="bold" fill="#1a1a2e">7-fold cross-validation pipeline</text>

  <!-- 7 folds -->
  <g transform="translate(280, 450)">
    <rect x="0"   y="0" width="120" height="55" fill="#4A7C59" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="60"  y="24" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Fold 1</text>
    <text x="60"  y="44" text-anchor="middle" font-size="11" fill="white">TRAIN</text>

    <rect x="120" y="0" width="120" height="55" fill="#4A7C59" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="180" y="24" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Fold 2</text>
    <text x="180" y="44" text-anchor="middle" font-size="11" fill="white">TRAIN</text>

    <rect x="240" y="0" width="120" height="55" fill="#4A7C59" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="300" y="24" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Fold 3</text>
    <text x="300" y="44" text-anchor="middle" font-size="11" fill="white">TRAIN</text>

    <rect x="360" y="0" width="120" height="55" fill="#4A7C59" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="420" y="24" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Fold 4</text>
    <text x="420" y="44" text-anchor="middle" font-size="11" fill="white">TRAIN</text>

    <rect x="480" y="0" width="120" height="55" fill="#4A7C59" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="540" y="24" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Fold 5</text>
    <text x="540" y="44" text-anchor="middle" font-size="11" fill="white">TRAIN</text>

    <rect x="600" y="0" width="120" height="55" fill="#4A7C59" stroke="#1a1a2e" stroke-width="1.5"/>
    <text x="660" y="24" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Fold 6</text>
    <text x="660" y="44" text-anchor="middle" font-size="11" fill="white">TRAIN</text>

    <rect x="720" y="0" width="120" height="55" fill="#E07B39" stroke="#1a1a2e" stroke-width="2"/>
    <text x="780" y="24" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Fold 7</text>
    <text x="780" y="44" text-anchor="middle" font-size="11" fill="white">TEST</text>
  </g>

  <!-- Global μ,σ arrow spanning train+test -->
  <g>
    <line x1="290" y1="525" x2="1110" y2="525" stroke="#C1121F" stroke-width="2.5"/>
    <line x1="290" y1="518" x2="290" y2="532" stroke="#C1121F" stroke-width="2.5"/>
    <line x1="1110" y1="518" x2="1110" y2="532" stroke="#C1121F" stroke-width="2.5"/>
    <rect x="555" y="535" width="290" height="28" rx="4" fill="#FFF1F1" stroke="#C1121F" stroke-width="1.5"/>
    <text x="700" y="554" text-anchor="middle" font-size="14" font-weight="bold" fill="#C1121F">
      μ_global, σ_global  ✗
    </text>
  </g>

  <!-- connector down -->
  <line x1="700" y1="565" x2="700" y2="615" stroke="#C1121F" stroke-width="2.5" stroke-dasharray="4,3"/>
  <polygon points="695,613 705,613 700,625" fill="#C1121F"/>

  <!-- Threat 2 box -->
  <g transform="translate(280, 625)">
    <rect x="0" y="0" width="840" height="125" rx="8" fill="#FFF1F1" stroke="#C1121F" stroke-width="2.5"/>
    <rect x="0" y="0" width="180" height="40" rx="6" fill="#C1121F"/>
    <text x="90" y="27" text-anchor="middle" font-size="16" font-weight="bold" fill="white">Threat #2</text>
    <text x="200" y="27" font-size="20" font-weight="bold" fill="#C1121F">Normalization Leakage</text>
    <text x="20" y="65" font-size="14" fill="#1a1a2e">Normalization statistics computed across the full dataset expose test-set variance to the</text>
    <text x="20" y="85" font-size="14" fill="#1a1a2e">training distribution, biasing the model and inflating cross-fold accuracy.</text>
    <text x="20" y="110" font-size="13" font-style="italic" fill="#555">Fix: compute μ̂_train, σ̂_train on training folds only; apply to validation and test folds.</text>
  </g>

  <!-- Footer caption -->
  <text x="700" y="795" text-anchor="middle" font-size="12" font-style="italic" fill="#555">
    SEED-DV [Liu et al. 2024]: 20 subjects · 7 sessions · 1,400 video clips (40 concepts × 5 clips × 7 sessions) · 62-channel EEG @ 200 Hz
  </text>
</svg>
